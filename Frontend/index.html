<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Inicio</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #f5f5f5;
        }

        /* Contenedor */
        .contenedor {
            width: 90%;
            max-width: 500px;
            margin: 40px auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
            padding: 20px;
        }

        /* Fondo */
        .hero {
            background: url("fondo.jpg") no-repeat center;
            background-size: 80%;
            background-position: center;
            background-repeat: no-repeat;
            height: 400px;
            padding: 30px;

            display: flex;
            justify-content: center;
            align-items: center;
        }

        .hero p {
            line-height: 1.8;
            margin-bottom: 18px;
        }

        /* Caja */
        .hero-box {
            background: transparent;
            padding: 40px 30px;
            border-radius: 20px;
            text-align: center;
        }

        /* Título */
        h1 {
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        /* Texto */
        p {
            margin-bottom: 30px;
            line-height: 1.6;
            letter-spacing: 1px;
        }

        /* Botón principal */
        .btn {
            display: block;
            width: 220px;
            margin: 10px auto;
            background: #2E7D32;
            color: white;
            padding: 14px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
        }

        /* Botón secundario */
        .btn-secundario {
            display: block;
            width: 220px;
            margin: 10px auto;
            background: white;
            border: 2px solid #2E7D32;
            color: #2E7D32;
            padding: 14px;
            border-radius: 12px;
            text-decoration: none;
        }
    </style>
</head>

<body>

<div class="contenedor">

    <div class="hero">
        <div class="hero-box">

            <h1>🌱 Red Digital de <br>
                Productos Locales</h1>

            <p>
                Compra productos frescos directamente <br>
                de productores locales 
            </p>

            <a href="inicio.html" class="btn">Iniciar sesión</a>
            <a href="Registro.html" class="btn-secundario">Registrarse</a>

        </div>
    </div>

</div>

</body>
</html>
