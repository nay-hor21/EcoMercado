<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>EcoMercado - Registro</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f5f5;
        }

        .header {
            background: linear-gradient(to right, #2e7d32, #66bb6a);
            height: 80px;
        }

        .container {
            width: 350px;
            margin: -40px auto;
            background: #fff;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
        }

        .logo {
            margin-bottom: 10px;
        }

        h2 {
            margin-bottom: 20px;
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        .btn {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    background: linear-gradient(to right, #2e7d32, #66bb6a);
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

.btn:hover {
    background: linear-gradient(to right, #1b5e20, #4caf50);
}

        .btn:hover {
            opacity: 0.9;
        }

        .login {
            margin-top: 15px;
            font-size: 14px;
        }

        .login a {
            color: #2a5bd7;
            text-decoration: none;
            font-weight: bold;
        }

        .logo img {
    width: 300px;
    margin-bottom: 5px; 
}

    </style>
</head>
<body>

    <div class="header"></div>

    <div class="container">
       <div class="logo">
    <img src="logoo.png" alt="EcoMercado">
</div>


        <h2>Crear cuenta</h2>

        <div class="input-group">
            <input type="text" placeholder="Nombre">
            <input type="text" placeholder="Apellido">
        </div>

        <input type="email" placeholder="Correo electrónico">
        <input type="tel" placeholder="Número telefónico">
        <input type="password" placeholder="Contraseña">

       <button class="btn" onclick="registrar()">Registrarse</button>

<div id="mensaje" style="margin-top:10px;font-size:14px;color:green"></div>

<script>
async function registrar() {
  const inputs = document.querySelectorAll('input');
  const data = {
    nombre: inputs[0].value,
    apellido: inputs[1].value,
    correo: inputs[2].value,
    telefono: inputs[3].value,
    password: inputs[4].value
  };

  const res = await fetch('http://localhost:5000/api/usuarios', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  });

  const result = await res.json();
  if (res.ok) {
    document.getElementById('mensaje').textContent = '✅ Registro exitoso!';
    setTimeout(() => window.location.href = 'inicio.html', 1500);
  } else {
    document.getElementById('mensaje').style.color = 'red';
    document.getElementById('mensaje').textContent = '❌ ' + result.error;
  }
}
</script>
    </div>

</body>
</html>
