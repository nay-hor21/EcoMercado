<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>EcoMercado — Iniciar sesión</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --g1:#0d2818;--g2:#1a4731;--g3:#2d7a52;--g4:#52b788;--g5:#b7e4c7;--g6:#e8f5ee;
  --cream:#fdf8ee;--amber:#e9b84a;
}

body{
  font-family:'Plus Jakarta Sans',sans-serif;
  background:#f0f2f0;
  min-height:100vh;
}

/* Barra superior */
.header{
  background:linear-gradient(to right, var(--g1), var(--g3));
  height:88px;
  display:flex;align-items:center;padding:0 32px;
  gap:12px;
}
.header-mark{
  width:40px;height:40px;
  background:rgba(255,255,255,.15);
  border:1px solid rgba(255,255,255,.25);
  border-radius:11px;
  display:flex;align-items:center;justify-content:center;font-size:20px;
}
.header-name{
  font-family:'Playfair Display',serif;
  font-weight:900;font-size:1.3rem;color:#fff;
}

/* Tarjeta */
.container{
  width:90%;max-width:420px;
  margin:-44px auto 40px;
  background:#fff;
  padding:36px 32px;
  border-radius:18px;
  box-shadow:0 8px 40px rgba(13,40,24,.13);
  position:relative;
}
.container::before{
  content:'';
  position:absolute;top:0;left:0;right:0;height:4px;
  background:linear-gradient(90deg,var(--g2),var(--g4));
  border-radius:18px 18px 0 0;
}

.logo{text-align:center;margin-bottom:6px}
.logo img{width:180px;object-fit:contain}

h2{
  text-align:center;
  font-family:'Playfair Display',serif;
  font-size:1.5rem;font-weight:900;
  color:var(--g1);margin-bottom:24px;
}

label{
  display:block;font-size:.8rem;font-weight:600;
  color:#3d4f42;margin-bottom:5px;margin-top:14px;
}

input[type=email],
input[type=password],
input[type=text]{
  width:100%;padding:11px 14px;
  border:1.5px solid #cfddd4;
  border-radius:9px;
  font-family:inherit;font-size:.92rem;color:#111;
  background:#fafcfa;
  transition:.2s;outline:none;
}
input:focus{border-color:var(--g3);box-shadow:0 0 0 3px rgba(45,122,82,.1);background:#fff}

.forgot{
  display:block;text-align:right;
  font-size:.76rem;color:var(--g3);
  text-decoration:none;margin-top:5px;
}
.forgot:hover{text-decoration:underline}

.btn{
  width:100%;padding:13px;
  margin-top:20px;
  background:linear-gradient(135deg,var(--g2),var(--g3));
  color:white;border:none;border-radius:10px;
  font-family:inherit;font-size:.97rem;font-weight:700;
  cursor:pointer;transition:.22s;
  box-shadow:0 4px 14px rgba(26,71,49,.2);
}
.btn:hover{background:linear-gradient(135deg,var(--g1),var(--g2));transform:translateY(-1px)}
.btn:disabled{opacity:.6;cursor:not-allowed;transform:none}

.divider{
  display:flex;align-items:center;gap:10px;
  margin:18px 0;color:#a0b0a5;font-size:.78rem;
}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#dce8df}

.btn-google{
  display:flex;align-items:center;justify-content:center;gap:10px;
  width:100%;padding:11px;border-radius:10px;
  border:1.5px solid #cfddd4;background:#fafcfa;
  font-family:inherit;font-weight:600;font-size:.92rem;
  color:#111;cursor:pointer;transition:.2s;text-decoration:none;
}
.btn-google:hover{background:var(--g6);border-color:var(--g4)}
.google-icon{width:19px;height:19px;flex-shrink:0}

.link{
  text-align:center;margin-top:20px;
  font-size:.83rem;color:#6b7f70;
}
.link a{color:var(--g2);font-weight:700;text-decoration:none}
.link a:hover{text-decoration:underline}

#msg{
  margin-top:14px;padding:13px 16px;
  border-radius:10px;font-size:.9rem;font-weight:600;
  display:none;text-align:center;
  border-left:4px solid transparent;
  animation:slideIn .25s ease;
}
@keyframes slideIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
#msg.error{background:#fff0f0;color:#c0392b;display:block;border-left-color:#e74c3c;box-shadow:0 2px 12px rgba(192,57,43,.12)}
#msg.ok{background:#e8f5ee;color:var(--g2);display:block;border-left-color:var(--g3);box-shadow:0 2px 12px rgba(45,122,82,.12)}
input.input-error{border-color:#e74c3c !important;background:#fff8f8 !important;animation:shake .35s ease}
</style>
</head>
<body>

<!-- Barra superior -->
<div class="header">
  <div class="header-mark">🌿</div>
  <span class="header-name">EcoMercado</span>
</div>

<!-- Tarjeta -->
<div class="container">
  <div class="logo">
    <img src="logoo.png" alt="EcoMercado" onerror="this.style.display='none'">
  </div>

  <h2>Iniciar sesión</h2>

  <label for="email">Correo electrónico</label>
  <input type="email" id="email" placeholder="tu@correo.com" autocomplete="email">

  <label for="password">Contraseña</label>
  <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">

  <a href="#" class="forgot">¿Olvidaste tu contraseña?</a>

  <div id="msg"></div>

  <button class="btn" id="btn-login" onclick="iniciarSesion()">Iniciar sesión</button>

  <div class="divider">o continúa con</div>

  <a href="http://localhost:5000/api/auth/google" class="btn-google">
    <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
      <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
      <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
      <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
    </svg>
    Continuar con Google
  </a>

  <div class="link">
    ¿No tienes cuenta? <a href="Registro.html">Regístrate gratis</a>
    &nbsp;·&nbsp;
    <a href="login.html">← Volver</a>
  </div>
</div>

<script>
// Capturar token de Google OAuth si viene en la URL
(function() {
  const params = new URLSearchParams(window.location.search);
  const urlToken  = params.get('token');
  const urlNombre = params.get('nombre');
  if (urlToken) {
    localStorage.setItem('eco_token', urlToken);
    if (urlNombre) localStorage.setItem('eco_nombre', decodeURIComponent(urlNombre));
    window.location.href = 'index.html';
    return;
  }
  // Si ya está autenticado, ir al inicio
  const token = localStorage.getItem('eco_token');
  if (token) {
    try {
      const payload = JSON.parse(atob(token.split('.')[1]));
      if (payload.exp * 1000 > Date.now()) {
        window.location.href = 'index.html';
      }
    } catch(e) {}
  }
})();

function mostrarError(texto, inputs) {
  const msg = document.getElementById('msg');
  msg.textContent = '⚠️ ' + texto;
  msg.className = 'error';
  // Limpiar y reanimar para que shake funcione cada vez
  if (inputs) inputs.forEach(id => {
    const el = document.getElementById(id);
    el.classList.remove('input-error');
    void el.offsetWidth; // force reflow
    el.classList.add('input-error');
  });
  msg.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

async function iniciarSesion() {
  const emailEl    = document.getElementById('email');
  const passwordEl = document.getElementById('password');
  const email      = emailEl.value.trim();
  const password   = passwordEl.value;
  const btn        = document.getElementById('btn-login');
  const msg        = document.getElementById('msg');

  // Limpiar estado anterior
  msg.className = '';
  msg.style.display = 'none';
  ['email','password'].forEach(id => document.getElementById(id).classList.remove('input-error'));

  if (!email && !password) {
    mostrarError('Completa tu correo y contraseña para continuar.', ['email','password']);
    return;
  }
  if (!email) {
    mostrarError('Ingresa tu correo electrónico.', ['email']);
    return;
  }
  if (!password) {
    mostrarError('Ingresa tu contraseña.', ['password']);
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Ingresando…';

  try {
    const res = await fetch('http://localhost:5000/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();

    if (res.ok) {
      localStorage.setItem('eco_token', data.token);
      localStorage.setItem('eco_nombre', data.usuario.nombre);
      msg.textContent = '✅ ' + data.mensaje;
      msg.className = 'ok';
      setTimeout(() => window.location.href = 'index.html', 800);
    } else {
      // Mensaje específico según el error
      const errorMsg = data.error || 'Credenciales incorrectas';
      mostrarError(errorMsg, ['email','password']);
      btn.disabled = false;
      btn.textContent = 'Iniciar sesión';
    }
  } catch(e) {
    mostrarError('No se pudo conectar con el servidor. ¿Está corriendo el backend?', []);
    btn.disabled = false;
    btn.textContent = 'Iniciar sesión';
  }
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') iniciarSesion(); });
</script>

</body>
</html>
