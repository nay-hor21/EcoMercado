<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>EcoMercado — Registrarse</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --g1:#0d2818;--g2:#1a4731;--g3:#2d7a52;--g4:#52b788;--g5:#b7e4c7;--g6:#e8f5ee;
  --cream:#fdf8ee;--amber:#e9b84a;
}

body{
  font-family:'Plus Jakarta Sans',sans-serif;
  background:#f0f2f0;
  min-height:100vh;
  padding-bottom:40px;
}

/* Barra superior */
.header{
  background:linear-gradient(to right, var(--g1), var(--g3));
  height:88px;
  display:flex;align-items:center;padding:0 32px;
  gap:12px;
}
.header-mark{
  width:40px;height:40px;
  background:rgba(255,255,255,.15);
  border:1px solid rgba(255,255,255,.25);
  border-radius:11px;
  display:flex;align-items:center;justify-content:center;font-size:20px;
}
.header-name{
  font-family:'Playfair Display',serif;
  font-weight:900;font-size:1.3rem;color:#fff;
}

/* Tarjeta */
.container{
  width:90%;max-width:440px;
  margin:-44px auto 40px;
  background:#fff;
  padding:36px 32px;
  border-radius:18px;
  box-shadow:0 8px 40px rgba(13,40,24,.13);
  position:relative;
}
.container::before{
  content:'';
  position:absolute;top:0;left:0;right:0;height:4px;
  background:linear-gradient(90deg,var(--g2),var(--g4));
  border-radius:18px 18px 0 0;
}

.logo{text-align:center;margin-bottom:6px}
.logo img{width:180px;object-fit:contain}

h2{
  text-align:center;
  font-family:'Playfair Display',serif;
  font-size:1.5rem;font-weight:900;
  color:var(--g1);margin-bottom:22px;
}

.row{display:flex;gap:10px}
.row > div{flex:1}

label{
  display:block;font-size:.8rem;font-weight:600;
  color:#3d4f42;margin-bottom:5px;margin-top:12px;
}

input[type=email],
input[type=password],
input[type=text]{
  width:100%;padding:11px 14px;
  border:1.5px solid #cfddd4;
  border-radius:9px;
  font-family:inherit;font-size:.92rem;color:#111;
  background:#fafcfa;
  transition:.2s;outline:none;
}
input:focus{border-color:var(--g3);box-shadow:0 0 0 3px rgba(45,122,82,.1);background:#fff}

.btn{
  width:100%;padding:13px;
  margin-top:20px;
  background:linear-gradient(135deg,var(--g2),var(--g3));
  color:white;border:none;border-radius:10px;
  font-family:inherit;font-size:.97rem;font-weight:700;
  cursor:pointer;transition:.22s;
  box-shadow:0 4px 14px rgba(26,71,49,.2);
}
.btn:hover{background:linear-gradient(135deg,var(--g1),var(--g2));transform:translateY(-1px)}
.btn:disabled{opacity:.6;cursor:not-allowed;transform:none}

.divider{
  display:flex;align-items:center;gap:10px;
  margin:18px 0;color:#a0b0a5;font-size:.78rem;
}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#dce8df}

.btn-google{
  display:flex;align-items:center;justify-content:center;gap:10px;
  width:100%;padding:11px;border-radius:10px;
  border:1.5px solid #cfddd4;background:#fafcfa;
  font-family:inherit;font-weight:600;font-size:.92rem;
  color:#111;cursor:pointer;transition:.2s;text-decoration:none;
}
.btn-google:hover{background:var(--g6);border-color:var(--g4)}
.google-icon{width:19px;height:19px;flex-shrink:0}

.login-link{
  text-align:center;margin-top:20px;
  font-size:.83rem;color:#6b7f70;
}
.login-link a{color:var(--g2);font-weight:700;text-decoration:none}
.login-link a:hover{text-decoration:underline}

#msg{
  margin-top:14px;padding:13px 16px;
  border-radius:10px;font-size:.9rem;font-weight:600;
  display:none;text-align:center;
  border-left:4px solid transparent;
  animation:slideIn .25s ease;
}
@keyframes slideIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
#msg.error{background:#fff0f0;color:#c0392b;display:block;border-left-color:#e74c3c;box-shadow:0 2px 12px rgba(192,57,43,.12)}
#msg.ok{background:#e8f5ee;color:var(--g2);display:block;border-left-color:var(--g3);box-shadow:0 2px 12px rgba(45,122,82,.12)}
input.input-error{border-color:#e74c3c !important;background:#fff8f8 !important;animation:shake .35s ease}

.terms{font-size:.73rem;color:#a0b0a5;text-align:center;margin-top:14px;line-height:1.5}

@media(max-width:480px){
  .row{flex-direction:column;gap:0}
  .container{padding:28px 20px}
}
</style>
</head>
<body>

<!-- Barra superior -->
<div class="header">
  <div class="header-mark">🌿</div>
  <span class="header-name">EcoMercado</span>
</div>

<!-- Tarjeta -->
<div class="container">
  <div class="logo">
    <img src="logoo.png" alt="EcoMercado" onerror="this.style.display='none'">
  </div>

  <h2>Crear cuenta</h2>

  <div class="row">
    <div>
      <label for="nombre">Nombre</label>
      <input type="text" id="nombre" placeholder="Tu nombre" autocomplete="given-name">
    </div>
    <div>
      <label for="apellido">Apellido</label>
      <input type="text" id="apellido" placeholder="Tu apellido" autocomplete="family-name">
    </div>
  </div>

  <label for="correo">Correo electrónico</label>
  <input type="email" id="correo" placeholder="tu@correo.com" autocomplete="email">

  <label for="password">Contraseña</label>
  <input type="password" id="password" placeholder="Mínimo 6 caracteres" autocomplete="new-password">

  <label for="confirm">Confirmar contraseña</label>
  <input type="password" id="confirm" placeholder="Repite tu contraseña" autocomplete="new-password">

  <div id="msg"></div>

  <button class="btn" id="btn-reg" onclick="registrar()">Registrarse</button>

  <div class="divider">o regístrate con</div>

  <a href="http://localhost:5000/api/auth/google" class="btn-google">
    <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
      <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
      <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
      <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
    </svg>
    Registrarse con Google
  </a>

  <p class="terms">Al registrarte aceptas nuestros Términos de Servicio y Política de Privacidad.</p>

  <div class="login-link">
    ¿Ya tienes cuenta? <a href="inicio.html">Iniciar sesión</a>
    &nbsp;·&nbsp;
    <a href="login.html">← Volver</a>
  </div>
</div>

<script>
function mostrarError(texto, inputs) {
  const msg = document.getElementById('msg');
  msg.textContent = '⚠️ ' + texto;
  msg.className = 'error';
  if (inputs) inputs.forEach(id => {
    const el = document.getElementById(id);
    el.classList.remove('input-error');
    void el.offsetWidth;
    el.classList.add('input-error');
  });
  msg.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

async function registrar() {
  const nombre   = document.getElementById('nombre').value.trim();
  const apellido = document.getElementById('apellido').value.trim();
  const correo   = document.getElementById('correo').value.trim();
  const password = document.getElementById('password').value;
  const confirm  = document.getElementById('confirm').value;
  const btn      = document.getElementById('btn-reg');
  const msg      = document.getElementById('msg');

  // Limpiar estado anterior
  msg.className = '';
  msg.style.display = 'none';
  ['nombre','correo','password','confirm'].forEach(id => document.getElementById(id).classList.remove('input-error'));

  if (!nombre) {
    mostrarError('Ingresa tu nombre.', ['nombre']); return;
  }
  if (!correo) {
    mostrarError('Ingresa tu correo electrónico.', ['correo']); return;
  }
  if (!password) {
    mostrarError('Crea una contraseña.', ['password']); return;
  }
  if (password.length < 6) {
    mostrarError('La contraseña debe tener al menos 6 caracteres.', ['password']); return;
  }
  if (!confirm) {
    mostrarError('Confirma tu contraseña.', ['confirm']); return;
  }
  if (password !== confirm) {
    mostrarError('Las contraseñas no coinciden. Verifícalas.', ['password','confirm']); return;
  }

  const nombreCompleto = apellido ? `${nombre} ${apellido}` : nombre;

  btn.disabled = true;
  btn.textContent = 'Creando cuenta…';

  try {
    const res = await fetch('http://localhost:5000/api/registro', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ nombre: nombreCompleto, email: correo, password })
    });
    const data = await res.json();

    if (res.ok) {
      msg.textContent = '✅ ¡Cuenta creada exitosamente! Redirigiendo al login…';
      msg.className = 'ok';
      setTimeout(() => window.location.href = 'inicio.html', 1500);
    } else {
      // Si el correo ya existe, resaltar el campo correo
      const errorTexto = data.error || 'Error al registrarse';
      const esEmailDuplicado = errorTexto.toLowerCase().includes('email') || errorTexto.toLowerCase().includes('registrado');
      mostrarError(errorTexto, esEmailDuplicado ? ['correo'] : []);
      btn.disabled = false;
      btn.textContent = 'Registrarse';
    }
  } catch(e) {
    mostrarError('No se pudo conectar con el servidor. ¿Está corriendo el backend?', []);
    btn.disabled = false;
    btn.textContent = 'Registrarse';
  }
}
</script>

</body>
</html>
