<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>EcoMercado - Login</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f0f0f0;
        }

        /* Barra superior verde */
        .header {
            background: linear-gradient(to right, #2e7d32, #66bb6a);
            height: 80px;
        }

        .container {
            width: 350px;
            margin: -40px auto;
            background: #fff;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
        }

        .logo img {
            width: 100px;
            margin-bottom: 5px;
        }

        h2 {
            margin-top: 10px;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        /* Botón verde */
        .btn {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            background: linear-gradient(to right, #2e7d32, #66bb6a);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }

        .btn:hover {
            background: linear-gradient(to right, #1b5e20, #4caf50);
        }

        .link {
            margin-top: 15px;
            font-size: 14px;
        }

        .link a {
            color: #2a5bd7;
            text-decoration: none;
        }

        hr {
            margin: 15px 0;
            border: 0.5px solid #ddd;
        }

        .logo img {
    width: 300px;
    margin-bottom: 5px; 
}

        
    </style>
</head>
<body>

    <div class="header"></div>

    <div class="container">
        <!-- Cambia el nombre por tu imagen -->
        <div class="logo">
            <img src="logoo.png" alt="EcoMercado">
        </div>

        <h2>Iniciar sesión</h2>

        <input type="text" placeholder="Correo electrónico o usuario">
        <input type="password" placeholder="Contraseña">

        <button class="btn"onclick="window.location.href='carritoo.html'" >
    Iniciar sesión
</button>

   
        <div class="link">
            <a href="#">¿Olvidaste tu contraseña?</a>
        </div>

        <hr>

      
    </div>

</body>
</html>
